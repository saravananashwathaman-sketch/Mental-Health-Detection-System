{% extends "base.html" %}
{% block title %}Questionnaire{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-12 px-4">
    <!-- Progress Header -->
    <div class="mb-10 animate-fade-in">
        <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Assessment in
                Progress</span>
            <span
                class="text-xs font-bold text-neon-blue bg-neon-blue/10 px-2 py-1 rounded-lg shadow-[0_0_10px_rgba(0,242,255,0.2)]">{{
                progress }}%
                Complete</span>
        </div>
        <div class="w-full bg-slate-100 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden shadow-inner">
            <div class="bg-gradient-to-r from-neon-blue to-neon-purple h-full rounded-full transition-all duration-700 shadow-[0_0_15px_rgba(0,242,255,0.4)]"
                style="width: {{ progress }}%"></div>
        </div>
    </div>

    <!-- Question Card -->
    <div
        class="bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 sm:p-12 border border-slate-100 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none animate-slide-up hover:border-neon-blue transition-all duration-500">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <h2 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-white leading-tight mb-10">{{
                question.question_text }}
            </h2>

            <div class="space-y-4">
                {% for option in options %}
                <label class="group relative block cursor-pointer">
                    <input type="radio" name="choice" value="{{ loop.index0 }}" required class="peer sr-only">
                    <div
                        class="p-6 rounded-2xl border-2 border-slate-50 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 text-slate-700 dark:text-slate-300 font-semibold transition-all
                               peer-checked:border-neon-blue peer-checked:bg-neon-blue/10 peer-checked:text-neon-blue
                               group-hover:bg-slate-100 dark:group-hover:bg-slate-800 flex items-center justify-between peer-checked:shadow-[0_0_15px_rgba(0,242,255,0.2)]">
                        <span>{{ option }}</span>
                        <div
                            class="w-6 h-6 rounded-full border-2 border-slate-200 dark:border-slate-700 peer-checked:border-neon-blue peer-checked:bg-neon-blue flex items-center justify-center transition-all shadow-sm">
                            <i class="bi bi-check-lg text-white text-xs opacity-0 peer-checked:opacity-100"></i>
                        </div>
                    </div>
                </label>
                {% endfor %}
            </div>

            <div class="mt-12">
                <button type="submit"
                    class="neon-btn w-full py-5 bg-gradient-to-r from-neon-blue to-blue-600 text-white font-bold rounded-2xl shadow-neon-blue border-none hover:scale-[1.02] transition-all flex items-center justify-center gap-2 group">
                    Next Question
                    <i class="bi bi-arrow-right transition-transform group-hover:translate-x-1"></i>
                </button>
            </div>
        </form>
    </div>

    <!-- Empathetic Note -->
    <p class="text-center text-slate-400 text-sm mt-8 animate-fade-in delay-500">
        <i class="bi bi-heart-fill text-rose-300 me-2"></i> Take your time. There are no wrong answers.
    </p>
</div>
{% endblock %}
